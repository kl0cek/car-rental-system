name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'car-rental-frontend/**'
            backend:
              - 'car-rental-backend/**'

  frontend-lint:
    name: "Frontend: Lint"
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: car-rental-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: car-rental-frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  frontend-type-check:
    name: "Frontend: Type Check"
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: car-rental-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: car-rental-frontend/package-lock.json
      - run: npm ci
      - run: npm run type-check

  frontend-test:
    name: "Frontend: Unit Tests"
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: car-rental-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: car-rental-frontend/package-lock.json
      - run: npm ci
      - run: npm run test

  backend-lint:
    name: "Backend: Lint (Ruff)"
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: car-rental-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: car-rental-backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .

  backend-type-check:
    name: "Backend: Type Check (mypy)"
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: car-rental-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: car-rental-backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: mypy app/

  backend-test:
    name: "Backend: Unit Tests (pytest)"
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: car-rental-backend
    env:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/driveease"
      MONGODB_URL: "mongodb://localhost:27017/driveease"
      REDIS_URL: "redis://localhost:6379/0"
      SECRET_KEY: "ci-test-secret-key-not-used-in-production"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: car-rental-backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest --cov=app --cov-report=term-missing
